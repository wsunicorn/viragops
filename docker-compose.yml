# ============================================================
# LLMOps RAG Platform — Docker Compose
# Phase 1: hạ tầng lõi (api, qdrant, postgres, valkey).
# Phase 7: litellm (model gateway — routing/fallback/cost, xem
# config/litellm_config.yaml; fallback cuối cùng gọi Ollama chạy trên
# host qua host.docker.internal, KHÔNG chạy trong compose).
# Mở rộng theo phase (xem docs/system/operations/deployment_docker_compose.md):
#   Phase 10 -> langfuse-web/worker, clickhouse, minio, prometheus, grafana
#   Phase 8+ -> mlflow
# ============================================================

services:
  api:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-llmops}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - QDRANT_URL=http://qdrant:6333
      - VALKEY_URL=redis://valkey:6379/0
      - LITELLM_BASE_URL=http://litellm:4000
      - LANGFUSE_HOST=http://langfuse-web:3000
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      valkey:
        condition: service_healthy
      litellm:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked in at build time (NEXT_PUBLIC_* is inlined client-side) —
        # host machine's localhost, not the `api` service DNS name, since
        # the browser (not the frontend container) is what calls this URL.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${APP_PORT:-8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_5=${GEMINI_API_KEY_5}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in .env}
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # host.docker.internal -> để container gọi được Ollama chạy trên máy
    # host Windows (fallback local, xem config/litellm_config.yaml).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # image không có curl/wget — dùng python (đã có sẵn trong base image).
      test: ["CMD", "python3", "-c", "import urllib.request as u; u.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-llmops}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-llmops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  pg_data:
  valkey_data:
