# ============================================================
# LLMOps RAG Platform — Docker Compose
# Phase 1: hạ tầng lõi (api, qdrant, postgres, valkey).
# Phase 7: litellm (model gateway — routing/fallback/cost, xem
# config/litellm_config.yaml; fallback cuối cùng gọi Ollama chạy trên
# host qua host.docker.internal, KHÔNG chạy trong compose).
# Phase 10: prometheus + grafana (local, /metrics scrape) — Langfuse dùng
# CLOUD (free tier, user tự tạo tài khoản 2026-07-14), KHÔNG self-host:
# máy dev hạn chế tài nguyên + dự án đã hay gặp trục trặc stack Docker
# nặng (xem CHECKLIST Phase 1/3), tự host thêm langfuse-web/worker+
# clickhouse+minio (4 container nữa) không đáng đánh đổi. Xem CHECKLIST
# Phase 10 cho quyết định đầy đủ.
# Mở rộng theo phase (xem docs/system/operations/deployment_docker_compose.md):
#   Phase 8+ -> mlflow
# ============================================================

services:
  api:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-llmops}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - QDRANT_URL=http://qdrant:6333
      - VALKEY_URL=redis://valkey:6379/0
      - LITELLM_BASE_URL=http://litellm:4000
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      valkey:
        condition: service_healthy
      litellm:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked in at build time (NEXT_PUBLIC_* is inlined client-side) —
        # host machine's localhost, not the `api` service DNS name, since
        # the browser (not the frontend container) is what calls this URL.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${APP_PORT:-8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  litellm:
    # Pinned by digest (2026-07-13) — "main-stable" is a moving tag, would
    # silently pull a different litellm build on a future `docker compose
    # pull`/rebuild (real reproducibility risk, flagged in CHECKLIST Phase
    # 7 "Chưa tốt"). Digest below = litellm 1.92.0 at pin time. Bump
    # deliberately: `docker run --rm --entrypoint litellm
    # ghcr.io/berriai/litellm:main-stable --version` then update the digest.
    image: ghcr.io/berriai/litellm@sha256:9ef6f45bc0104940571765e610c52a1d761b5ec85efcd193795281086ee61277
    ports:
      - "4000:4000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEY_2=${GEMINI_API_KEY_2}
      - GEMINI_API_KEY_5=${GEMINI_API_KEY_5}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in .env}
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # host.docker.internal -> để container gọi được Ollama chạy trên máy
    # host Windows (fallback local, xem config/litellm_config.yaml).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # image không có curl/wget — dùng python (đã có sẵn trong base image).
      test: ["CMD", "python3", "-c", "import urllib.request as u; u.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-llmops}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-llmops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus_alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    # host.docker.internal -> scrape API chạy trực tiếp trên host (dev,
    # `uvicorn src.api.main:app`) — khi chạy API qua compose (`api` service)
    # đổi target trong config/prometheus.yml sang "api:8000".
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3001:3000"   # 3000 đã dùng cho frontend Next.js
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  pg_data:
  valkey_data:
  prometheus_data:
  grafana_data:
