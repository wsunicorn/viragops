# Prometheus scrape + alerting config — Phase 10 (Module 7).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: viragops-api
    metrics_path: /metrics
    static_configs:
      # host.docker.internal: API chạy trực tiếp trên host lúc dev
      # (`uvicorn src.api.main:app`). Chạy API qua compose (`docker
      # compose up api`) thì đổi target sang "api:8000" (DNS trong cùng
      # network compose).
      - targets: ["host.docker.internal:8000"]
