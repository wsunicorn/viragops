# Model gateway config — schema chuẩn: docs/system/contracts/config_schemas.md
# QUY TẮC: runtime KHÔNG hard-code model. Mọi model call đi qua tier ở đây.
#
# TRẠNG THÁI HIỆN TẠI (2026-07-10): chỉ có GEMINI_API_KEY (free tier).
# OpenAI/Anthropic chưa có key -> mọi tier tạm dùng Gemini. Khi có thêm key,
# đổi provider/model ở đây — KHÔNG sửa code runtime.
#
# ĐÃ VERIFY THẬT bằng client.models.generate_content() với key hiện tại
# (không chỉ tra docs — nhiều model "có trong danh sách" vẫn bị chặn free tier):
#   - gemini-3.1-flash-lite : OK, nhanh (~1-2s)  -> primary cho mọi tier nhẹ
#   - gemini-3-flash-preview: OK, chậm (~15-20s) -> dùng khi cần suy luận kỹ
#                              hơn (strong/judge), KHÔNG dùng cho path latency-
#                              critical (NFR-002 p95 <= 6s áp cho tier balanced)
#   - gemini-2.5-flash-lite : lỗi 503 lặp lại (server quá tải phía Google tại
#                              thời điểm test) -> KHÔNG đưa vào fallback chủ động
#   - gemini-3.5-flash      : lỗi 503 tương tự -> KHÔNG đưa vào fallback chủ động
#   - gemini-2.5-flash      : lỗi 404 "no longer available to new users"
#   - gemini-2.0-flash(-lite): lỗi 429 quota limit=0 cho free tier (project này)
# -> Vì chỉ có 2 model chắc chắn hoạt động, fallback tạm thời trỏ vào NHAU
#    (khác model, không khác provider). Khi 2.5-flash-lite/3.5-flash ổn định
#    trở lại, có thể thêm làm fallback thứ 2 — xem log Phase 7.
gateway_config_id: gateway_gemini_free_v1
default_timeout_seconds: 30    # gemini-3-flash-preview có thể mất ~20s
budget:
  daily_usd: 0.0        # free tier — không phát sinh chi phí, theo dõi qua rate_limits
  monthly_usd: 0.0
routes:
  cheap:
    primary:
      provider: gemini
      model: gemini-3.1-flash-lite
    fallback:
      provider: gemini
      model: gemini-3-flash-preview
  balanced:
    primary:
      provider: gemini
      model: gemini-3.1-flash-lite
    fallback:
      provider: gemini
      model: gemini-3-flash-preview
  strong:
    primary:
      provider: gemini
      model: gemini-3-flash-preview
    fallback:
      provider: gemini
      model: gemini-3.1-flash-lite
  judge:
    primary:
      provider: gemini
      model: gemini-3-flash-preview
    fallback:
      provider: gemini
      model: gemini-3.1-flash-lite
  # Phase 3: embedding cho chunk/query — model riêng (không phải generation
  # model), verify thật bằng client.models.embed_content() (2026-07-11).
  embedding:
    primary:
      provider: gemini
      model: gemini-embedding-001
    fallback:
      provider: gemini
      model: gemini-embedding-001   # chưa có model embedding thứ 2 để fallback thật
rate_limits:
  # Free tier flash-lite: quan sát thực tế ổn định ở mức thấp; đặt bảo thủ
  # để tránh 429 khi chạy eval batch (300 câu). Điều chỉnh khi đo throughput
  # thật ở Phase 7-8.
  requests_per_minute: 10
  tokens_per_minute: 200000
  # Đo thật (2026-07-11): quota free tier gemini-embedding-001 là
  # "EmbedContentRequestsPerMinutePerUserPerProjectPerModel-FreeTier",
  # quotaValue=100 — MỖI text trong 1 lệnh gọi batch tính là 1 request, không
  # phải 1 lệnh gọi = 1 request. Batch 100 text lấp đầy quota ngay lập tức;
  # gọi tiếp trong cùng phút bị 429 kèm retryDelay tăng dần (13s -> 40s khi
  # gọi dồn dập). Script ingest dùng batch <=80 + chờ >=65s giữa các batch.
  embedding_requests_per_minute: 100
  embedding_batch_size: 80

# --- Provider khác (chưa có key, giữ lại làm tài liệu cấu hình tương lai) ---
# openai:
#   cheap: gpt-5-mini
#   balanced: gpt-5.4-mini
#   strong/judge: gpt-5.5
# anthropic:
#   strong/judge: claude-sonnet / claude-opus
