# Retrieval config — schema chuẩn: docs/system/contracts/config_schemas.md
# CHỐT BẰNG SỐ LIỆU THẬT (Phase 4, 2026-07-11) — experiment 8 config trên 71
# câu golden set, xem docs/system/experiments/results_retrieval_reranking.md:
#   hybrid DBSF prefetch-40 thắng: recall@5=0.993, hit=1.000, MRR=0.827,
#   nDCG@5=0.869, p95=17ms. (RRF: 0.979; sparse-only: 0.944; dense-only: 0.908.)
retrieval_config_id: hybrid_dbsf_v2
data_version: data_20260712
index_version: idx_20260712_geminiembedding001
# 2026-07-12: re-ingest thêm doc_camnang_dangky_hocphan (D14) khi mở rộng
# golden set 76->300 câu. Cùng 9 doc cũ + 1 doc mới (222 chunk structure_aware,
# +2 so với 220 trước đó) — cấu hình fusion/threshold GIỮ NGUYÊN vì chỉ thêm
# nội dung, chưa re-run experiment 8-config; xem CHECKLIST Phase 4 "Chưa tốt".
query_normalization: true
retrieval:
  type: hybrid              # dense | sparse | hybrid
  dense:
    provider: qdrant
    top_k: 40               # prefetch depth — pre40 nhỉnh hơn pre20 về MRR/p95
  sparse:
    provider: qdrant_sparse   # BM25 tự viết (src/dataops/sparse_bm25.py)
    top_k: 40
  fusion:
    method: dbsf            # rrf | dbsf — DBSF thắng RRF trên mọi metric (0.993 vs 0.979)
reranker:
  # TẮT theo số liệu thật: (1) bge-reranker-v2-m3 không tải được (ISP chặn
  # CDN huggingface.co — cùng lỗi fastembed Phase 3); (2) phương án thay thế
  # Gemini listwise rerank LÀM GIẢM chất lượng hybrid (recall 0.979->0.958,
  # MRR 0.819->0.718) và cộng ~1s latency/câu. Rerank chỉ giúp dense-only
  # (0.908->0.923). Bật lại + đổi model nếu sau này tải được cross-encoder.
  enabled: false
  model: bge-reranker-v2-m3   # giữ làm tài liệu — chưa dùng được
  top_k_before: 20
  top_k_after: 5
thresholds:
  min_score: 0.15
  min_context_chunks: 2
