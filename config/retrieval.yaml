# Retrieval config — schema chuẩn: docs/system/contracts/config_schemas.md
# Baseline Phase 4 sẽ bắt đầu bằng dense; hybrid + rerank là ứng viên chính.
retrieval_config_id: hybrid_rrf_rerank_v1
data_version: null          # gán khi có ingest thật (vd data_20260715)
index_version: null         # gán khi có index thật (vd idx_20260715_bge_m3)
query_normalization: true
retrieval:
  type: hybrid              # dense | sparse | hybrid
  dense:
    provider: qdrant
    top_k: 20
  sparse:
    provider: qdrant_sparse
    top_k: 20
  fusion:
    method: rrf             # rrf | dbsf
    rrf_k: 60
reranker:
  enabled: true
  model: bge-reranker-v2-m3
  top_k_before: 20
  top_k_after: 5
thresholds:
  min_score: 0.15
  min_context_chunks: 2
