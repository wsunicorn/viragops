# Retrieval config — schema chuẩn: docs/system/contracts/config_schemas.md
# CHỐT BẰNG SỐ LIỆU THẬT (Phase 4 gốc, 2026-07-11, 71 câu) và TÁI XÁC NHẬN
# (2026-07-12, 249/300 câu sau khi mở rộng golden set) — xem
# docs/system/experiments/results_retrieval_reranking.md:
#   hybrid DBSF prefetch-40 vẫn thắng cả 2 lần chạy: recall@5=0.993->0.932,
#   hit=1.000->0.944, MRR=0.827->0.791, nDCG@5=0.869->0.815, p95=17->19ms.
#   Số liệu giảm khi golden set lớn hơn/đa dạng hơn (kỳ vọng — không phải
#   dấu hiệu retrieval kém đi) nhưng THỨ HẠNG config không đổi: DBSF > RRF
#   (0.906) > sparse (0.865) > dense (0.882 — sparse/dense đổi chỗ nhẹ so
#   với lần đầu, chênh lệch nhỏ trong margin nhiễu).
retrieval_config_id: hybrid_dbsf_v2
data_version: data_20260713
index_version: idx_20260713_geminiembedding001
# 2026-07-12: re-ingest thêm doc_camnang_dangky_hocphan (D14) khi mở rộng
# golden set 76->300 câu (222 chunk structure_aware, +2 so với 220 trước
# đó). Đã re-run đủ 8-config experiment trên bộ 300 câu (249 câu có căn cứ)
# — kết luận GIỮ NGUYÊN, không cần đổi fusion/threshold.
# 2026-07-13: re-ingest lại (222 chunk, số lượng KHÔNG đổi) chỉ để mang
# page_start/page_end thật vào chunk (trước đó luôn None — xem CHECKLIST
# Phase 3 "Chưa tốt"; fix: src/dataops/vietnamese_normalizer.py
# tag_pages/extract_page_range). Không đổi nội dung/text chunk theo cách
# ảnh hưởng embedding — không cần chạy lại Phase 4 experiment.
query_normalization: true
retrieval:
  type: hybrid              # dense | sparse | hybrid
  dense:
    provider: qdrant
    top_k: 40               # prefetch depth — pre40 nhỉnh hơn pre20 về MRR/p95
  sparse:
    provider: qdrant_sparse   # BM25 tự viết (src/dataops/sparse_bm25.py)
    top_k: 40
  fusion:
    method: dbsf            # rrf | dbsf — DBSF thắng RRF trên mọi metric (0.993 vs 0.979)
reranker:
  # TẮT theo số liệu thật: (1) bge-reranker-v2-m3 không tải được (ISP chặn
  # CDN huggingface.co — cùng lỗi fastembed Phase 3); (2) Gemini listwise
  # rerank vẫn KHÔNG thắng được hybrid DBSF (best config không rerank).
  # LƯU Ý (2026-07-12, 249 câu — khác kết luận lần đầu 71 câu): trên bộ
  # câu lớn hơn, rerank thực ra CÓ giúp cả dense (0.882->0.894) lẫn
  # hybrid_rrf (0.906->0.928) — không còn "luôn làm giảm chất lượng" như
  # kết luận cũ, nhưng vẫn KHÔNG vượt được hybrid_dbsf không-rerank
  # (0.932) và cộng latency cực lớn khi bị rate-limit thật (p95 đo được
  # 61s/câu do retry — xem results_retrieval_reranking.md). Kết luận
  # "không cần bật" vẫn đúng, nhưng lý do chính xác hơn là "không đáng
  # đánh đổi latency" chứ không phải "luôn làm giảm chất lượng". Bật lại
  # + đổi model nếu sau này tải được cross-encoder (nhanh hơn, không phụ
  # thuộc rate-limit API).
  enabled: false
  model: bge-reranker-v2-m3   # giữ làm tài liệu — chưa dùng được
  top_k_before: 20
  # top_k_after: THỬ 5->10 (2026-07-12), ĐÃ REVERT VỀ 5 sau khi validate
  # thật ở tầng generation. Retrieval-only cho thấy recall@k tăng đơn
  # điệu ở mọi category khi tăng limit (ambiguous +10.6 điểm %, multi_hop
  # +3.3, factoid +2.1 — xem docs/system/experiments/
  # results_context_limit_ablation.md) — nhưng đo THẬT qua generation
  # (multi_hop, n=30, cùng prompt, chạy sạch qua Gemini không dính Ollama
  # fallback) cho kết quả NGƯỢC: Citation Accuracy GIẢM 0.700->0.650 khi
  # limit=10. Kết luận: nhiều chunk hơn giúp chunk đúng "có mặt" nhưng
  # làm model dễ trích nhầm/trích thừa hơn (nhiều distractor hơn) — với
  # metric mục tiêu là Citation Accuracy (không phải Recall), tăng limit
  # là NƯỚC ĐI SAI dù retrieval-only nhìn có vẻ tốt hơn. Bài học: không
  # suy ra chất lượng generation chỉ từ số liệu retrieval-only, luôn phải
  # đo thêm 1 bước qua model thật trước khi đổi production config.
  top_k_after: 5
thresholds:
  min_score: 0.15
  min_context_chunks: 2
