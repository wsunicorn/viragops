# CI — Phase 1: lint + unit tests. Phase 9 (Quality Gate, xem
# docs/system/modules/06_quality_gate_cicd.md): gate DECISION LOGIC
# (src/qualitygate/gate.py + 16-simulated-changes suite trong
# tests/unit/test_quality_gate.py) chạy Ở ĐÂY, trong job lint-test bên
# dưới — pure Python, không cần service nào.
#
# CHƯA implement: job chạy 1 smoke eval THẬT (50 câu qua RagService) rồi
# gate nó ngay trong CI, như module doc hình dung. Lý do thật: data/chunks/
# (chunk+embedding) bị gitignore (xem .gitignore) — 1 runner CI mới hoàn
# toàn không có Qdrant collection nào để retrieve, sẽ phải re-ingest+
# re-embed từ đầu mỗi lần chạy (tốn quota Gemini thật mỗi PR, cần
# GEMINI_API_KEY secret chưa cấu hình, và caching 1 Qdrant snapshot giữa
# các run CI chưa được thiết kế). Chạy tay hiện tại:
#   python scripts/run_evaluation.py --mode smoke
#   python scripts/check_gate.py --mode smoke --latest [--baseline <path>]
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # dataops/ragops cần cho tests/unit/test_chunker.py, test_sparse_bm25.py
        # (tiktoken, mmh3) từ Phase 3 — .[dev] một mình không đủ nữa.
        run: pip install -e ".[dev,dataops,ragops]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Unit tests (bao gồm quality gate decision logic + 16 thay đổi giả lập)
        run: pytest tests/unit -q

